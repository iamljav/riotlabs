<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>riot laboratories</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            background-color: #ffffff;
            color: #000;
            font-family: "Courier New", Courier, monospace;
            overflow: hidden;
        }

        .wrapper {
            display: grid;
            grid-template-rows: repeat(8, 1fr); 
            height: 100vh;
            width: 100%;
            align-items: center;
            justify-items: center;
            position: relative;
            z-index: 1;
        }

        /* Part 1: Logo (Trigger) */
        header {
            grid-row: 1;
            cursor: help;
            z-index: 100; /* Ensure logo stays above the overlay */
        }

        .logo {
            max-width: 42px;
            height: auto;
        }

        /* Parts 3-6: Central Block */
        .content-block {
            grid-row: 3 / span 4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: scale(1.2);
        }

        .figure-container img {
            max-height: 37.5vh;
            width: auto;
            max-width: 90vw;
            display: block;
        }

        .baseline {
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Part 8: Icons */
        footer {
            grid-row: 8;
        }

        .socials {
            display: flex;
            gap: 20px;
        }

        .socials a {
            color: #000;
            transition: color 0.2s ease;
            text-decoration: none;
        }

        .socials a:hover {
            color: #a31d4b; 
        }

        .socials svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ABOUT OVERLAY */
        .about-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s;
            z-index: 50;
            padding: 40px;
            box-sizing: border-box;
        }

        .about-text {
            max-width: 500px;
            line-height: 1.6;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
        }

        /* Trigger logic: Hovering the header reveals the overlay */
        header:hover ~ .about-overlay {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <img src="assets/logo.png" alt="riot laboratories" class="logo">
        </header>

        <div class="content-block">
            <div class="figure-container">
                <img src="assets/background.png" alt="figure">
            </div>
            <div class="baseline">
                NON COMPLIANT SINCE Y2K
            </div>
        </div>

        <footer class="socials">
            <a href="https://instagram.com" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line></svg>
            </a>
            <a href="mailto:contact@riotlaboratories.com" aria-label="Email">
                <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </a>
            <a href="#" target="_blank" aria-label="Shop">
                <svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
            </a>
        </footer>

        <div class="about-overlay">
            <div class="about-text">
                a creative research collective focused on exploring new ideas, languages, and technologies.
            </div>
        </div>
    </div>

</body>
</html>
