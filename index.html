<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ephemeral engine</title>

    <link rel="icon" type="image/jpg" href="assets/favicon.jpg">

    <meta name="description" content="a creative research collective exploring new ideas, behaviors, languages, and technologies.">
    <meta property="og:title" content="ephemeral engine">
    <meta property="og:description" content="a creative research collective exploring new ideas, behaviors, languages, and technologies.">
    <meta property="og:image" content="assets/background.gif">
    <meta name="twitter:card" content="summary_large_image">

    <style>
        @font-face {
            font-family: 'Nikkei';
            src: url('assets/Nikkei.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Nikkei', sans-serif;
            overflow: hidden;
        }

        /* GIF background */
        .bg-gif {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background-image: url('assets/background.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.22;
            mix-blend-mode: screen;
            filter: grayscale(60%) sepia(40%) hue-rotate(340deg) saturate(1.4);
        }

        /* Vignette */
        .bg-vignette {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.75) 100%);
            pointer-events: none;
        }

        /* Subtle orange glow */
        .bg-orange {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            background: radial-gradient(ellipse at 60% 50%, rgba(255, 85, 0, 0.07) 0%, transparent 70%),
                        radial-gradient(ellipse at 30% 70%, rgba(220, 60, 0, 0.05) 0%, transparent 60%);
            pointer-events: none;
        }

        /* Full page centered layout */
        .wrapper {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Center hub — logo + baseline stacked */
        .center-hub {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
        }

        .logo {
            width: 83px;
            height: auto;
            display: block;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.25));
            transition: opacity 0.4s ease, filter 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .center-hub:hover .logo {
            opacity: 0;
        }

        .baseline {
            font-size: 0.75rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            transition: opacity 0.3s ease;
            position: relative;
            z-index: 2;
        }

        /* About text — expands outward from center on hover */
        .about-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.82);
            width: 420px;
            max-width: 88vw;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            z-index: 3;
            cursor: pointer;
        }

        .about-ring p {
            font-size: 0.90rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.9);
            margin: 0;
            padding: 0 16px;
        }

        /* Hover state (desktop) */
        .center-hub:hover .about-ring {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .center-hub:hover .logo { opacity: 0; }
        .center-hub:hover .baseline { opacity: 0; }

        /* Locked open state (tap on mobile) */
        .center-hub.is-open .about-ring {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .center-hub.is-open .logo { opacity: 0; }
        .center-hub.is-open .baseline { opacity: 0; }

        /* Footer socials — fixed bottom center */
        footer {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 11;
        }

        .socials {
            display: flex;
            gap: 20px;
        }

        .socials a {
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease, filter 0.2s ease;
            text-decoration: none;
        }

        .socials a:hover {
            color: #FF5500;
            filter: drop-shadow(0 0 6px #FF5500);
        }

        .socials svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @media (max-width: 600px) {
            .logo { width: 64px; }
            .about-ring { width: 92vw; }
            .about-ring p { font-size: 0.83rem; letter-spacing: 0.14em; }
        }
    </style>
</head>
<body>

    <div class="bg-gif"></div>

    <div class="wrapper">

        <div class="center-hub">
            <!-- About text radiates outward from center -->
            <div class="about-ring">
                <p>a creative research collective exploring new ideas, behaviors, languages, and technologies.</p>
            </div>

            <img src="assets/logo.png" alt="ephemeral engine" class="logo">
            <div class="baseline">NON COMPLIANCE SINCE Y2K</div>
        </div>

    </div>
